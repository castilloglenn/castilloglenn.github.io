<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Under Maintenance</title>

    <!-- Tab icon (wrench + screwdriver, Heroicons) -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

    <!-- Google Fonts: JetBrains Mono (techy/monospace) + Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS (CDN) + runtime config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind.config.js"></script>
  </head>

  <body
    class="h-full bg-slate-950 text-slate-200 antialiased selection:bg-emerald-400/20"
  >
    <main
      class="flex min-h-full flex-col items-center justify-center px-6 py-16 text-center"
    >
      <!-- Heroicons (popular, free, MIT) -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="h-16 w-16 text-emerald-400"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 0 0 4.486-6.336l-3.276 3.277a3.004 3.004 0 0 1-2.25-2.25l3.276-3.276a4.5 4.5 0 0 0-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437 1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008Z"
        />
      </svg>

      <p
        class="mt-8 font-mono text-xs uppercase tracking-[0.3em] text-emerald-400"
      >
        Status: 503
      </p>

      <h1 class="mt-4 font-display text-4xl font-bold text-white sm:text-5xl">
        Under Maintenance
      </h1>

      <p class="mt-4 max-w-md font-mono text-sm leading-relaxed text-slate-400">
        We're currently shipping some improvements. The site will be back online
        shortly — thanks for your patience.
      </p>

      <!-- Terminal-style detail for the techy vibe -->
      <div
        class="mt-10 w-full max-w-md rounded-lg border border-slate-800 bg-slate-900/60 text-left font-mono text-sm shadow-lg"
      >
        <div
          class="flex items-center gap-2 border-b border-slate-800 px-4 py-2.5"
        >
          <span class="h-3 w-3 rounded-full bg-red-500/80"></span>
          <span class="h-3 w-3 rounded-full bg-yellow-500/80"></span>
          <span class="h-3 w-3 rounded-full bg-green-500/80"></span>
          <span class="ml-2 text-xs text-slate-500">~/deploy</span>
        </div>
        <div class="space-y-1 px-4 py-4">
          <p><span class="text-emerald-400">$</span> git push origin main</p>
          <p class="text-slate-400">Deploying new build...</p>
          <p class="text-slate-400">
            <span class="text-yellow-400">●</span> Maintenance in progress
          </p>
        </div>
      </div>

      <footer class="mt-12 font-mono text-xs text-slate-600">
        &copy; <span id="year"></span> Glenn Castillo
      </footer>
    </main>

    <script src="js/main.js"></script>
  </body>
</html>
