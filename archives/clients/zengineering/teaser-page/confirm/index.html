<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>入力内容の確認 | ZENGINEERING</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Raleway:wght@200;300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared/shared.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-root=".." data-active-nav="development">
    <div class="page-shell">
      <div data-shared-header></div>

      <main class="utility-main" id="top">
        <section class="utility-stage confirm-stage">
          <div class="confirm-card">
            <h1>入力内容に間違いはありませんか？</h1>

            <div class="confirm-fields">
              <div class="confirm-field">
                <div class="confirm-field__label is-required">会社名</div>
                <div class="confirm-field__value" data-confirm-field="company"></div>
              </div>
              <div class="confirm-field">
                <div class="confirm-field__label is-required">ご担当者名</div>
                <div class="confirm-field__value" data-confirm-field="name"></div>
              </div>
              <div class="confirm-field">
                <div class="confirm-field__label is-required">メールアドレス</div>
                <div class="confirm-field__value" data-confirm-field="email"></div>
              </div>
              <div class="confirm-field">
                <div class="confirm-field__label is-required">
                  メールアドレスを再入力
                </div>
                <div class="confirm-field__value" data-confirm-field="confirm-email"></div>
              </div>
            </div>

            <div class="confirm-grid">
              <section class="confirm-group">
                <h2>ご相談内容</h2>
                <ul data-confirm-list="topics"></ul>
              </section>

              <section class="confirm-group confirm-group--split">
                <h2>返信方法のご希望</h2>
                <ul data-confirm-list="contactMethod"></ul>
              </section>
            </div>

            <section class="confirm-message">
              <div class="confirm-message__box">
                <div class="confirm-field__label is-required">お問い合わせ内容</div>
                <div class="confirm-message__value" data-confirm-field="message"></div>
              </div>
            </section>

            <form
              class="confirm-submit-form"
              action="https://submit-form.com/W8t2kRdpJ"
              method="post"
            >
              <input type="hidden" name="_redirect" value="" />
              <input type="hidden" name="_error" value="" />
              <input type="hidden" name="_append" value="false" />
              <div class="confirm-submit-form__fields" data-confirm-hidden-fields></div>

              <div class="confirm-actions">
                <button class="utility-button utility-button--icon" type="submit">
                  <img src="../assets/shared/check-icon-confirm.svg" alt="" aria-hidden="true" />
                  <span>確認・送信</span>
                </button>
              </div>
            </form>
          </div>
        </section>
      </main>

      <div data-shared-footer></div>
    </div>

    <script src="../shared/components.js"></script>
    <script src="main.js"></script>
  </body>
</html>
