<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Devine 💕</title>
    <meta name="description" content="A little something I made just for you." />

    <!-- Tab icon: a soft heart -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%95%3C/text%3E%3C/svg%3E"
    />

    <!-- Google Fonts: Dancing Script (handwritten) + Quicksand (soft rounded) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS (CDN) + runtime config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>

    <!-- Project styles (gradient, 3D flip, animations) -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="min-h-full overflow-x-hidden font-body text-plum">
    <!-- floating hearts get injected here -->
    <div class="hearts pointer-events-none fixed inset-0 z-0 overflow-hidden" aria-hidden="true"></div>

    <main class="relative z-10 mx-auto max-w-[1040px] px-5 pb-16 pt-12 text-center sm:pt-24">
      <p class="rise text-sm font-semibold uppercase tracking-[0.28em] text-rose-deep [animation-delay:0.1s]">
        A little something for you
      </p>
      <h1
        id="title"
        class="rise font-script text-6xl font-bold leading-none text-rose-deep drop-shadow sm:text-[5.5rem] [animation-delay:0.2s]"
      >
        For Devine 💕
      </h1>
      <p class="rise mx-auto mt-4 max-w-md text-base text-plum-soft sm:text-lg [animation-delay:0.35s]">
        Some days I run out of words, so I made you a place to keep them. Here are
        a few of the <span class="love-phrase">reasons I love you</span>.
      </p>
      <p class="rise mt-7 text-sm text-plum-soft [animation-delay:0.5s]">
        tap a card to reveal it <span class="bob">👇</span>
      </p>

      <section class="grid-cards mt-12 sm:mt-16" id="grid" aria-label="Reasons I love you"></section>
    </main>

    <footer class="relative z-10 px-5 pb-14 pt-10 text-center text-plum-soft">
      <div><span id="count">0</span> reasons and still counting…</div>
      <div class="mt-1 font-script text-3xl text-rose-deep">always yours 💌</div>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
