<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <title>For Devine 💕</title>
    <meta name="description" content="Our story, one moment at a time." />
    <meta name="theme-color" content="#1c1016" />

    <!-- Tab icon: a soft heart -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%95%3C/text%3E%3C/svg%3E"
    />

    <!-- Google Fonts: Dancing Script (handwritten) + Quicksand (soft rounded) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS (CDN) + runtime config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>

    <!-- Project styles (full-screen story, Ken-Burns, animations) -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="font-body">
    <!-- story-style progress bars (filled by main.js) -->
    <div class="bars" id="bars" aria-hidden="true"></div>

    <!-- floating hearts overlay -->
    <div class="hearts" aria-hidden="true"></div>

    <!-- the slides are built by main.js -->
    <main class="story" id="story" aria-label="Our story, one moment at a time"></main>

    <script src="main.js"></script>
  </body>
</html>
